<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Weather App</title>
  <link rel="stylesheet" href="weather.css">
</head>
<body>
  <div class="app">
    <h1>🌤 Global Weather App</h1>
    <input type="text" id="city-input" placeholder="Enter city name...">
    <button id="get-weather-btn">Get Weather</button>

    <div id="weather-container" class="hidden">
      <h2 id="location"></h2>
      <img id="weather-icon" alt="Weather Icon">
      <p id="weather-main"></p>
      <p>Main Temperature: <span id="main-temperature"></span> °C</p>
      <p>Feels Like: <span id="feels-like"></span> °C</p>
      <p>Humidity: <span id="humidity"></span>%</p>
      <p>Wind Speed: <span id="wind"></span> m/s</p>
      <p>Wind Gust: <span id="wind-gust"></span> m/s</p>
      <p>Sunrise: <span id="sunrise"></span></p>
      <p>Sunset: <span id="sunset"></span></p>
    </div>
  </div>

  <script src="weather.js"></script>
</body>
</html>
